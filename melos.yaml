name: keenpockets_workspace

packages:
  - .
  - packages/**

scripts:
  analyze:
    description: Analyze every package in the workspace.
    run: melos exec -- "flutter analyze"

  test:
    description: Run tests in packages that have them.
    run: melos exec --dir-exists=test -- "flutter test"

  gen:
    description: Run build_runner where codegen is configured.
    run: melos exec --depends-on=build_runner -- "dart run build_runner build --delete-conflicting-outputs"
