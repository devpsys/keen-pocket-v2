name: keenpockets
description: "Production-grade Flutter application following Feature-Based Clean Architecture."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # In-repo packages (compiler-enforced boundaries; features depend on these,
  # never the reverse). See docs/adr/0003.
  core:
    path: packages/core
  design_system:
    path: packages/design_system

  # State management
  flutter_bloc: ^9.1.1
  bloc: ^9.0.0

  # Functional error handling (Either/Option) — the project's Result type
  fpdart: ^1.1.1

  # Functional / immutability (annotations are pure Dart -> safe in domain layer)
  freezed_annotation: ^3.0.0
  json_annotation: ^4.9.0

  # Dependency injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Networking
  dio: ^5.8.0+1
  connectivity_plus: ^6.1.3

  # Persistence
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.2
  drift: ^2.20.0
  drift_flutter: ^0.2.0

  # Navigation (Flutter-team-recommended router; required for multi-page nav)
  go_router: ^14.8.1

  # i18n
  intl: any

  # Icons
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

  # Code generation
  build_runner: ^2.4.15
  freezed: ^3.0.6
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  drift_dev: ^2.20.0

  # App launcher icon generation (run: dart run flutter_launcher_icons)
  flutter_launcher_icons: ^0.14.4

  # Linting & architecture enforcement
  flutter_lints: ^6.0.0
  custom_lint: ^0.8.1
  architecture_linter:
    path: packages/architecture_linter

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true # enables flutter gen-l10n

# App launcher icons — generated from the designed 1024 icon. Regenerate with
# `dart run flutter_launcher_icons` after changing assets/icon/app_icon.png.
flutter_launcher_icons:
  image_path: "assets/icon/app_icon.png"
  # Android: legacy mipmaps from the full designed icon + adaptive icon on a
  # brand-blue background (the icon already reads as a rounded blue tile).
  android: true
  min_sdk_android: 21
  adaptive_icon_background: "#1CB0F6"
  adaptive_icon_foreground: "assets/icon/app_icon.png"
  # iOS icons must be opaque & square — fill the rounded transparent corners
  # with the brand blue so iOS applies its own mask cleanly.
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#1CB0F6"
  macos:
    generate: true
    image_path: "assets/icon/app_icon.png"
  windows:
    generate: true
    image_path: "assets/icon/app_icon.png"
    icon_size: 256
