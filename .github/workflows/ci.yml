name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

env:
  FLUTTER_VERSION: "3.44.0"

jobs:
  # ── Quality gate: format, analyze, architecture lints, tests, coverage ──────
  analyze_and_test:
    name: Analyze • Lint • Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate code (freezed / json / injectable / l10n)
        run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs

      - name: Verify formatting
        run: dart format --set-exit-if-changed .

      - name: Static analysis (app)
        run: flutter analyze

      - name: Static analysis (packages/core)
        run: cd packages/core && dart pub get && dart analyze

      - name: Static analysis (packages/design_system)
        run: cd packages/design_system && flutter pub get && flutter analyze

      - name: Static analysis (architecture_linter)
        run: cd packages/architecture_linter && dart pub get && dart analyze

      - name: Architecture validation (custom_lint)
        run: dart run custom_lint

      - name: Unit / widget / bloc tests with coverage
        run: flutter test --coverage

      - name: Enforce coverage threshold (overall >= 70%, per blueprint)
        run: bash scripts/check_coverage.sh 70

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/lcov.info

  # ── Build Android ───────────────────────────────────────────────────────────
  build_android:
    name: Build Android (APK)
    runs-on: ubuntu-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs
      - run: flutter build apk --debug

  # ── Build iOS ────────────────────────────────────────────────────────────────
  build_ios:
    name: Build iOS (no codesign)
    runs-on: macos-latest
    needs: analyze_and_test
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: |
          flutter gen-l10n
          dart run build_runner build --delete-conflicting-outputs
      - run: flutter build ios --debug --no-codesign
