# Flutter localization generation config.
# Run `flutter gen-l10n` (also runs automatically on `flutter pub get` because
# `generate: true` is set in pubspec.yaml).
arb-dir: lib/core/localization/arb
template-arb-file: app_en.arb
output-dir: lib/core/localization/generated
output-localization-file: app_localizations.dart
output-class: AppLocalizations
nullable-getter: false
