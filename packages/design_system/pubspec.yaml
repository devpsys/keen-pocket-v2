name: design_system
description: KeenPocket brand design system — tokens (KpColors/KpSpacing/…), themes (KpTheme), and reusable Kp* widgets incl. KpAsyncView. Flutter UI only; no business logic, no networking.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: ^3.12.0
  flutter: ">=3.44.0"

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../core

dev_dependencies:
  flutter_lints: ^6.0.0
